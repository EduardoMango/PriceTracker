# This is a sample docker-compose file
# And should be changed to fit your needs

services:

  db:
    image: postgres:16
    container_name: price-tracker-db
    restart: always
    environment:
      POSTGRES_DB: pricetracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: price-tracker-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pricetracker
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: Tj}0&J>s9H&cjzYpc2ljG@Mq2r?7^>&Gaceowu{L9ZM
      JWT_EXPIRATION: 86400000
    restart: always

  mailhog:
    image: mailhog/mailhog
    container_name: price-tracker-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI

volumes:
  postgres_data: